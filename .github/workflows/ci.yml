name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uvx ruff@0.15.20 check .
      - run: uvx ruff@0.15.20 format --check .

  typecheck:
    name: ty (type check)
    runs-on: ubuntu-latest
    # Astral's ty is pre-1.0; keep it informational until the tree is ty-clean,
    # then drop continue-on-error to make it blocking.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv venv
      - run: uv pip install -r requirements-test.txt
      - run: uv run ty check

  hassfest:
    name: Hassfest (manifest validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # This is a personal/custom repo not added to home-assistant/brands.
          ignore: brands

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv venv
      - run: uv pip install -r requirements-test.txt
      - run: uv run pytest --cov=custom_components.gardena_aquaprecise_ble --cov-report=term-missing
